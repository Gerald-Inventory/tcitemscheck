<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Item Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth scrolling for better mobile UX */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-12">

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-blue-600">tcitems.csv Lookup</h1>
            <p class="text-sm text-gray-500">Auto-loaded from GitHub • Search, remark, and export</p>
        </header>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-200">
            <div id="loadingStatus" class="text-sm text-blue-600 font-medium text-center py-2 animate-pulse">
                ⏳ Loading tcitems.csv from repository...
            </div>
            
            <button id="downloadBtn" disabled class="w-full bg-green-600 text-white py-2.5 px-4 rounded-md font-medium shadow-sm hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition justify-center items-center hidden">
                Download Updated CSV
            </button>
        </div>

        <div id="workspace" class="hidden">
            
            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-200 space-y-4">
                <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wider">Search Filters</h2>
                
                <div>
                    <label for="searchId" class="block text-xs font-medium text-gray-500 mb-1">ITEM_ID (Numbers Only)</label>
                    <input type="text" id="searchId" inputmode="numeric" pattern="[0-9]*" placeholder="e.g., 12345" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base">
                </div>

                <div>
                    <label for="searchDesc" class="block text-xs font-medium text-gray-500 mb-1">DESCRIPTION (Text)</label>
                    <input type="text" id="searchDesc" placeholder="e.g., Wireless Mouse" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base">
                </div>
            </div>

            <div class="mb-6">
                <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-2">Results</h2>
                <div id="tilesContainer" class="grid grid-cols-1 gap-3">
                    <p class="text-gray-400 text-sm italic">Type above to filter items...</p>
                </div>
            </div>

            <div id="detailSection" class="hidden bg-white p-5 rounded-xl shadow-md border-2 border-blue-500 space-y-4 sticky bottom-4 z-10 max-h-[80vh] overflow-y-auto">
                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                    <h3 class="text-lg font-bold text-gray-900">Item Details</h3>
                    <button id="closeDetail" class="text-gray-400 hover:text-gray-600 font-bold text-xl px-2">&times;</button>
                </div>
                
                <div id="detailFields" class="space-y-2 text-sm"></div>

                <div class="pt-2 border-t border-gray-100">
                    <label for="remarksInput" class="block text-sm font-semibold text-gray-700 mb-1">Remarks</label>
                    <textarea id="remarksInput" rows="3" placeholder="Enter your notes here..." class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"></textarea>
                </div>

                <button id="saveRemarkBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium shadow hover:bg-blue-700 transition">
                    Save Changes
                </button>
            </div>

        </div>
    </div>

    <script>
        // App State
        let csvHeaders = [];
        let csvData = []; 
        let activeRowIndex = null;

        // UI Elements
        const loadingStatus = document.getElementById('loadingStatus');
        const downloadBtn = document.getElementById('downloadBtn');
        const workspace = document.getElementById('workspace');
        const searchId = document.getElementById('searchId');
        const searchDesc = document.getElementById('searchDesc');
        const tilesContainer = document.getElementById('tilesContainer');
        const detailSection = document.getElementById('detailSection');
        const detailFields = document.getElementById('detailFields');
        const remarksInput = document.getElementById('remarksInput');
        const saveRemarkBtn = document.getElementById('saveRemarkBtn');
        const closeDetail = document.getElementById('closeDetail');

        // Automatically fetch "tcitems.csv" when the page loads
        window.addEventListener('DOMContentLoaded', () => {
            fetch('tcitems.csv')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Could not find tcitems.csv in the root folder.');
                    }
                    return response.text();
                })
                .then(text => {
                    parseCSV(text);
                    loadingStatus.className = "text-sm text-green-600 font-medium text-center py-2";
                    loadingStatus.innerHTML = "✅ tcitems.csv loaded successfully!";
                })
                .catch(error => {
                    loadingStatus.className = "text-sm text-red-600 font-medium text-center py-2";
                    loadingStatus.innerHTML = `❌ Error: ${error.message}`;
                    console.error(error);
                });
        });

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length === 0) return;

            // Extract Headers
            csvHeaders = lines[0].split(',').map(h => h.trim());
            
            // Auto-append 'REMARKS' header if it doesn't exist
            if (!csvHeaders.includes('REMARKS')) {
                csvHeaders.push('REMARKS');
            }

            // Map rows to JavaScript Objects
            csvData = lines.slice(1).map((line, index) => {
                const values = line.split(',').map(v => v.trim());
                const rowObj = { _originalIndex: index }; 
                
                csvHeaders.forEach((header, i) => {
                    rowObj[header] = values[i] || ''; 
                });
                return rowObj;
            });

            // Reveal hidden dashboard spaces
            workspace.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
            downloadBtn.removeAttribute('disabled');
        }

        // Search & Filter Handling
        searchId.addEventListener('input', renderTiles);
        searchDesc.addEventListener('input', renderTiles);

        function renderTiles() {
            const idQuery = searchId.value.toLowerCase().trim();
            const descQuery = searchDesc.value.toLowerCase().trim();

            if (!idQuery && !descQuery) {
                tilesContainer.innerHTML = '<p class="text-gray-400 text-sm italic">Type above to filter items...</p>';
                return;
            }

            const filtered = csvData.filter(row => {
                const itemId = (row['ITEM_ID'] || '').toLowerCase();
                const description = (row['DESCRIPTION'] || '').toLowerCase();
                return itemId.includes(idQuery) && description.includes(descQuery);
            });

            if (filtered.length === 0) {
                tilesContainer.innerHTML = '<p class="text-gray-500 text-sm">No items found.</p>';
                return;
            }

            tilesContainer.innerHTML = '';
            filtered.forEach(row => {
                const tile = document.createElement('div');
                tile.className = 'bg-white p-4 rounded-lg shadow-xs border border-gray-200 active:bg-blue-50 cursor-pointer transition flex justify-between items-center';
                
                tile.innerHTML = `
                    <div>
                        <div class="text-xs font-bold text-blue-600">ID: ${row['ITEM_ID'] || 'N/A'}</div>
                        <div class="text-sm font-medium text-gray-800 line-clamp-1">${row['DESCRIPTION'] || 'No Description'}</div>
                        ${row['REMARKS'] ? `<div class="text-xs text-green-600 mt-1 italic">✓ Has Remark</div>` : ''}
                    </div>
                    <div class="text-gray-400">&#x276F;</div>
                `;

                tile.addEventListener('click', () => showDetails(row._originalIndex));
                tilesContainer.appendChild(tile);
            });
        }

        // Detail View Presentation
        function showDetails(index) {
            activeRowIndex = index;
            const row = csvData.find(r => r._originalIndex === index);
            
            detailFields.innerHTML = '';
            csvHeaders.forEach(header => {
                if (header !== 'REMARKS') {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'flex flex-col border-b border-gray-50 pb-1';
                    itemDiv.innerHTML = `
                        <span class="text-gray-400 text-xs uppercase font-medium">${header}</span>
                        <span class="text-gray-900 font-medium">${row[header] || '-'}</span>
                    `;
                    detailFields.appendChild(itemDiv);
                }
            });

            remarksInput.value = row['REMARKS'] || '';
            detailSection.classList.remove('hidden');
            detailSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Save Local Changes
        saveRemarkBtn.addEventListener('click', () => {
            if (activeRowIndex === null) return;

            const targetRow = csvData.find(r => r._originalIndex === activeRowIndex);
            if (targetRow) {
                targetRow['REMARKS'] = remarksInput.value.trim();
                alert('Remark recorded successfully!');
                detailSection.classList.add('hidden');
                renderTiles(); 
            }
        });

        closeDetail.addEventListener('click', () => {
            detailSection.classList.add('hidden');
            activeRowIndex = null;
        });

        // Download Final Document
        downloadBtn.addEventListener('click', () => {
            if (csvData.length === 0) return;

            const csvRows = [];
            csvRows.push(csvHeaders.join(',')); 

            csvData.forEach(row => {
                const lineValues = csvHeaders.map(header => {
                    let cell = row[header] === undefined || row[header] === null ? '' : String(row[header]);
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n')) {
                        cell = `"${cell.replace(/"/g, '""')}"`;
                    }
                    return cell;
                });
                csvRows.push(lineValues.join(','));
            });

            const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
            const encodedUri = encodeURI(csvContent);
            
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "tcitems_updated.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
