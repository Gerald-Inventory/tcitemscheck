<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Item Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-12">

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-blue-600">CSV Lookup Tool</h1>
            <p class="text-sm text-gray-500">Auto-loaded from GitHub • Isolated Column Search</p>
        </header>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-200">
            <div id="loadingStatus" class="text-sm text-blue-600 font-medium text-center py-2 animate-pulse">
                ⏳ Loading CSV from repository...
            </div>
            
            <button id="downloadBtn" disabled class="w-full bg-green-600 text-white py-2.5 px-4 rounded-md font-medium shadow-sm hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition justify-center items-center hidden">
                Download Updated CSV
            </button>
        </div>

        <div id="workspace" class="hidden">
            
            <form id="searchForm" class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-200 space-y-4">
                <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wider">Search Filters</h2>
                
                <div>
                    <label id="labelId" for="searchId" class="block text-xs font-medium text-gray-500 mb-1">IDENTIFIER</label>
                    <input type="text" id="searchId" placeholder="Search ID..." class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base">
                </div>

                <div>
                    <label id="labelDesc" for="searchDesc" class="block text-xs font-medium text-gray-500 mb-1">DESCRIPTION</label>
                    <input type="text" id="searchDesc" placeholder="Search Text..." class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base">
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium shadow-sm hover:bg-blue-700 transition flex justify-center items-center gap-2 cursor-pointer">
                    🔍 Execute Search
                </button>
            </form>

            <div class="mb-6">
                <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-2">Results</h2>
                <div id="tilesContainer" class="grid grid-cols-1 gap-3">
                    <p class="text-gray-400 text-sm italic">Enter criteria above and click search...</p>
                </div>
            </div>

            <div id="detailSection" class="hidden bg-white p-5 rounded-xl shadow-md border-2 border-blue-500 space-y-4 sticky bottom-4 z-10 max-h-[80vh] overflow-y-auto">
                <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                    <h3 class="text-lg font-bold text-gray-900">Item Details</h3>
                    <button id="closeDetail" class="text-gray-400 hover:text-gray-600 font-bold text-xl px-2">&times;</button>
                </div>
                
                <div id="detailFields" class="space-y-2 text-sm"></div>

                <!-- CHANGED: Swapped input for textarea to cleanly display and allow full selection of long text descriptions -->
                <div class="pt-2 border-t border-gray-100">
                    <label id="editDescLabel" for="editDescInput" class="block text-sm font-semibold text-gray-700 mb-1">Modify Description</label>
                    <textarea id="editDescInput" rows="3" placeholder="Edit description text..." class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"></textarea>
                </div>

                <div class="pt-2 border-t border-gray-100">
                    <label for="remarksInput" class="block text-sm font-semibold text-gray-700 mb-1">My Remarks</label>
                    <textarea id="remarksInput" rows="3" placeholder="Type your personal remarks here..." class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"></textarea>
                </div>

                <button id="saveRemarkBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium shadow hover:bg-blue-700 transition">
                    Save Changes
                </button>
            </div>

        </div>
    </div>

    <script>
        // App State
        let csvHeaders = [];
        let csvData = []; 
        let activeRowIndex = null;

        // Dynamic Keys Config
        let idKey = '';
        let descKey = '';
        const REMARKS_KEY = 'MY REMARKS';

        // UI Elements
        const loadingStatus = document.getElementById('loadingStatus');
        const downloadBtn = document.getElementById('downloadBtn');
        const workspace = document.getElementById('workspace');
        const searchForm = document.getElementById('searchForm');
        const searchId = document.getElementById('searchId');
        const searchDesc = document.getElementById('searchDesc');
        const labelId = document.getElementById('labelId');
        const labelDesc = document.getElementById('labelDesc');
        const tilesContainer = document.getElementById('tilesContainer');
        const detailSection = document.getElementById('detailSection');
        const detailFields = document.getElementById('detailFields');
        
        const editDescLabel = document.getElementById('editDescLabel');
        const editDescInput = document.getElementById('editDescInput');
        const remarksInput = document.getElementById('remarksInput');
        const saveRemarkBtn = document.getElementById('saveRemarkBtn');
        const closeDetail = document.getElementById('closeDetail');

        // Fetch CSV data stream
        window.addEventListener('DOMContentLoaded', () => {
            fetch('tcitems.csv')
                .then(response => {
                    if (!response.ok) throw new Error('Could not find tcitems.csv in the repository folder.');
                    return response.text();
                })
                .then(text => parseCSV(text))
                .catch(error => {
                    loadingStatus.className = "text-sm text-red-600 font-medium text-center py-2";
                    loadingStatus.innerHTML = `❌ Error: ${error.message}`;
                    console.error(error);
                });
        });

        // Robust CSV Line Parser
        function parseCSVLines(text) {
            let lines = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                let next = text[i+1];

                if (c === '"') {
                    if (inQuotes && next === '"') { 
                        row[row.length - 1] += '"'; 
                        i++; 
                    } else { 
                        inQuotes = !inQuotes; 
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') {
                lines.push(row);
            }
            return lines;
        }

        function parseCSV(text) {
            const allParsedLines = parseCSVLines(text);
            if (allParsedLines.length === 0) return;

            csvHeaders = allParsedLines[0].map(h => h.trim());
            
            // Explicit Header Priority Mapping
            const foundIdKey = csvHeaders.find(h => {
                const norm = h.toLowerCase();
                return norm.includes('id') || norm.includes('sku') || norm.includes('number') || norm.includes('code');
            });
            const foundDescKey = csvHeaders.find(h => {
                const norm = h.toLowerCase();
                return norm.includes('desc') || norm.includes('name') || norm.includes('title') || norm.includes('item');
            });

            idKey = foundIdKey || csvHeaders[0] || 'COLUMN_1';
            descKey = foundDescKey || csvHeaders[1] || 'COLUMN_2';

            // Update user view labels
            labelId.textContent = `${idKey} (Identifier Search)`;
            labelDesc.textContent = `${descKey} (Text Search)`;
            searchId.placeholder = `Search by ${idKey}...`;
            searchDesc.placeholder = `Search by ${descKey}...`;
            editDescLabel.textContent = `Modify ${descKey}`;

            if (!csvHeaders.includes(REMARKS_KEY)) {
                csvHeaders.push(REMARKS_KEY);
            }

            csvData = allParsedLines.slice(1).map((values, index) => {
                const rowObj = { _originalIndex: index }; 
                csvHeaders.forEach((header, i) => {
                    rowObj[header] = values[i] !== undefined ? values[i].trim() : ''; 
                });
                return rowObj;
            });

            loadingStatus.className = "text-sm text-green-600 font-medium text-center py-2";
            loadingStatus.innerHTML = `✅ Loaded successfully! (${csvData.length} records mapped)`;

            workspace.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
            downloadBtn.removeAttribute('disabled');
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            renderTiles();
        });

        function renderTiles() {
            const idQuery = searchId.value.toLowerCase().trim();
            const descQuery = searchDesc.value.toLowerCase().trim();

            if (!idQuery && !descQuery) {
                tilesContainer.innerHTML = '<p class="text-red-500 text-sm italic">Please enter at least one filter before searching.</p>';
                return;
            }

            tilesContainer.innerHTML = '<p class="text-gray-500 text-sm animate-pulse">Filtering dataset...</p>';

            setTimeout(() => {
                const filtered = csvData.filter(row => {
                    const rowIdValue = (row[idKey] || '').toLowerCase();
                    const rowDescValue = (row[descKey] || '').toLowerCase();

                    const matchesId = idQuery === '' || rowIdValue.includes(idQuery);
                    const matchesDesc = descQuery === '' || rowDescValue.includes(descQuery);

                    return matchesId && matchesDesc;
                });

                if (filtered.length === 0) {
                    tilesContainer.innerHTML = '<p class="text-gray-500 text-sm">No matching items found.</p>';
                    return;
                }

                tilesContainer.innerHTML = '';
                filtered.forEach(row => {
                    const tile = document.createElement('div');
                    tile.className = 'bg-white p-4 rounded-lg shadow-xs border border-gray-200 active:bg-blue-50 cursor-pointer transition flex justify-between items-center';
                    
                    tile.innerHTML = `
                        <div class="max-w-[90%]">
                            <div class="text-xs font-bold text-blue-600">${idKey}: ${row[idKey] || 'N/A'}</div>
                            <div class="text-sm font-medium text-gray-800 line-clamp-1">${row[descKey] || 'No Data Available'}</div>
                            ${row[REMARKS_KEY] ? `<div class="text-xs text-green-600 mt-1 italic">✓ Has Remarks</div>` : ''}
                        </div>
                        <div class="text-gray-400 text-sm">&#x276F;</div>
                    `;

                    tile.addEventListener('click', () => showDetails(row._originalIndex));
                    tilesContainer.appendChild(tile);
                });
            }, 50); 
        }

        function showDetails(index) {
            activeRowIndex = index;
            const row = csvData.find(r => r._originalIndex === index);
            
            detailFields.innerHTML = '';
            csvHeaders.forEach(header => {
                if (header !== REMARKS_KEY && header !== descKey) {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'flex flex-col border-b border-gray-50 pb-1';
                    itemDiv.innerHTML = `
                        <span class="text-gray-400 text-xs uppercase font-medium">${header}</span>
                        <span class="text-gray-900 font-medium break-words">${row[header] || '-'}</span>
                    `;
                    detailFields.appendChild(itemDiv);
                }
            });

            editDescInput.value = row[descKey] || '';
            remarksInput.value = row[REMARKS_KEY] || '';
            
            detailSection.classList.remove('hidden');
            detailSection.scrollIntoView({ behavior: 'smooth' });
        }

        // ADDED: Automatically select the full text of the description when clicked/focused
        editDescInput.addEventListener('focus', () => {
            editDescInput.select();
        });

        saveRemarkBtn.addEventListener('click', () => {
            if (activeRowIndex === null) return;

            const targetRow = csvData.find(r => r._originalIndex === activeRowIndex);
            if (targetRow) {
                targetRow[descKey] = editDescInput.value.trim();
                targetRow[REMARKS_KEY] = remarksInput.value.trim();
                
                alert('Changes saved successfully!');
                detailSection.classList.add('hidden');
                renderTiles(); 
            }
        });

        closeDetail.addEventListener('click', () => {
            detailSection.classList.add('hidden');
            activeRowIndex = null;
        });

        downloadBtn.addEventListener('click', () => {
            if (csvData.length === 0) return;

            const csvRows = [];
            csvRows.push(csvHeaders.join(',')); 

            csvData.forEach(row => {
                const lineValues = csvHeaders.map(header => {
                    let cell = row[header] === undefined || row[header] === null ? '' : String(row[header]);
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n') || cell.includes('\r')) {
                        cell = `"${cell.replace(/"/g, '""')}"`;
                    }
                    return cell;
                });
                csvRows.push(lineValues.join(','));
            });

            const csvString = csvRows.join("\n");
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "tcitems_updated.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
